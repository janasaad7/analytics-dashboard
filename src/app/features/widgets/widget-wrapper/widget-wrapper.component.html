<div
  class="card relative border border-gray-400 rounded-lg shadow-md p-2 overflow-hidden transition-opacity duration-200 {{ customClasses() }}"
>
  <button
    class="absolute top-1 right-1 text-gray-400 hover:text-red-400 transition-colors cursor-pointer z-10"
    (click)="dismiss.emit()"
    aria-label="Remove Widget"
  >
    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 18 6M6 6l12 12"/>
    </svg>
  </button>

  <ng-content></ng-content>
</div>
